server:
  host: 127.0.0.1
  port: 8765
  mcp_path: /mcp

proxy:
  enabled: true
  url: http://127.0.0.1:7897
  wait_for_proxy_seconds: 120
  no_proxy:
    - 127.0.0.1
    - localhost
    - ::1

workspace:
  ttl_hours: 168
  max_active_per_project: 8

process:
  max_running_jobs: 3
  max_running_jobs_per_workspace: 2
  queue_timeout_seconds: 0
  heartbeat_interval_seconds: 2
  default_timeout_seconds: 600
  max_timeout_seconds: 3600
  max_output_chars: 200000
  output_tail_chars: 50000
  cpu_time_seconds: 0
  memory_bytes: 0
  max_processes: 0
  max_output_bytes: 20971520
  max_disk_bytes: 0

files:
  max_read_chars: 100000
  deny_paths:
    - .git
    - .env
    - .env.local

image:
  max_file_size_bytes: 20971520
  max_pixels: 50000000
  max_dimension: 10000
  max_dimension_high: 2048
  supported_formats:
    - image/png
    - image/jpeg
    - image/webp
  deny_svg: true

artifacts:
  retention_days: 7
  cleanup_on_workspace_discard: true
  max_discovery_files: 100

logging:
  level: INFO
  retention_days: 14
  max_file_bytes: 10485760
  backup_count: 5

service:
  task_name: gpt-local-code-operator
  tunnel_enabled: true
  tunnel_profile: local-code-operator
  tunnel_health_url: http://127.0.0.1:8080/readyz
  poll_interval_seconds: 2
  heartbeat_interval_seconds: 5
  startup_timeout_seconds: 120
  shutdown_timeout_seconds: 20
  restart:
    initial_delay_seconds: 2
    multiplier: 2
    max_delay_seconds: 60
    stable_reset_seconds: 300
  cleanup:
    reconcile_on_start: true
    report_expired_workspaces: true
    auto_discard_clean_expired: false
