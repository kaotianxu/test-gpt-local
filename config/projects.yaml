projects:
  phase4-order-fixture:
    name: Phase 4 Order Fixture
    repository: C:/Users/20906/OneDrive - University of Illinois - Urbana/文档/test-gpt-local/output/phase4-fixture
    worktree_root: E:/GPTWorktrees/phase4-order-fixture

    pwsh:
      executable: C:/Program Files/PowerShell/7/pwsh.exe
      default_timeout_seconds: 60
      max_timeout_seconds: 120
      max_output_chars: 200000
      inherit_user_environment: true

    checks:
      unit_tests:
        script: |
          python -m pytest -q
        timeout_seconds: 60
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTEST_ADDOPTS: "-p no:cacheprovider"

      lint:
        script: |
          python -m ruff check .
        timeout_seconds: 60

      typecheck:
        script: |
          python -m mypy .
        timeout_seconds: 60

      git_tests:
        description: Legacy check ID; verifies diff whitespace and reports working-tree state separately.
        result_semantics: git_diff_check
        script: |
          git status --short
          git diff --check
        timeout_seconds: 60

  Gpt-Local:
    name: Gpt-Local
    repository: C:/OD-UIUC/文档/test-gpt-local
    worktree_root: E:/GPTWorktrees/gpt-local

    pwsh:
      executable: C:/Program Files/PowerShell/7/pwsh.exe
      default_timeout_seconds: 600
      max_timeout_seconds: 3600
      max_output_chars: 200000
      inherit_user_environment: true

    checks:
      section1_acceptance:
        description: Verify database/process isolation, randomized ordering, parallel execution, lint, and types.
        script: |
          python scripts/accept-section1.py
        timeout_seconds: 1800
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      section2_acceptance:
        description: Verify the central ToolSpec registry, middleware, errors, versioning, and idempotency contract.
        script: |
          python scripts/accept-iteration.py --section 2
        timeout_seconds: 600

      section3_acceptance:
        description: Verify keyed fair scheduling, resource limits, and restart recovery contracts.
        script: |
          python scripts/accept-iteration.py --section 3
        timeout_seconds: 600

      section4_acceptance:
        description: Verify the symbol-level code-intelligence tool surface.
        script: |
          python scripts/accept-iteration.py --section 4
        timeout_seconds: 600

      section5_acceptance:
        description: Verify append-only events, cursors, and process subscription contracts.
        script: |
          python scripts/accept-iteration.py --section 5
        timeout_seconds: 600

      section6_acceptance:
        description: Verify atomic multi-file change-set lifecycle operations.
        script: |
          python scripts/accept-iteration.py --section 6
        timeout_seconds: 600

      section7_acceptance:
        description: Verify structured plan evidence and dependency-aware check execution.
        script: |
          python scripts/accept-iteration.py --section 7
        timeout_seconds: 600

      section8_acceptance:
        description: Verify streaming large-file, cursor, and artifact-cache contracts.
        script: |
          python scripts/accept-iteration.py --section 8
        timeout_seconds: 600

      section9_acceptance:
        description: Verify portable configuration, SQL migrations, and dependency locking.
        script: |
          python scripts/accept-iteration.py --section 9
        timeout_seconds: 600

      iteration_acceptance:
        description: Run all iteration-plan acceptance gates; incomplete roadmap sections fail explicitly.
        script: |
          python scripts/accept-iteration.py --section all
        timeout_seconds: 3600
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      unit_tests:
        script: |
          python -m pytest -q
        timeout_seconds: 1800
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTEST_ADDOPTS: "-p no:cacheprovider"

      lint:
        script: |
          python -m ruff check .
        timeout_seconds: 600

      typecheck:
        script: |
          python -m mypy app
        timeout_seconds: 900

      git_tests:
        description: Legacy check ID; verifies diff whitespace and reports working-tree state separately.
        result_semantics: git_diff_check
        script: |
          git status --short
          git diff --check
        timeout_seconds: 120
